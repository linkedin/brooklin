apply from: file('gradle/license.gradle')
apply from: file('gradle/environment.gradle')
apply from: file("gradle/dependency-versions.gradle")
apply from: file("gradle/install-git-hooks.gradle")

buildscript {
  repositories {
    mavenCentral()
  }
  apply from: file('gradle/buildscript.gradle'), to: buildscript
}

allprojects {
  group = "com.linkedin.datastream"

  apply plugin: 'eclipse'
  apply plugin: 'idea'
  apply plugin: 'project-report'
  apply plugin: 'checkstyle'

  repositories {
    mavenCentral()
    maven {
      url  "https://linkedin.jfrog.io/artifactory/open-source"
    }
    maven {
      url  "https://linkedin.jfrog.io/artifactory/zookeeper"
    }
    mavenLocal()
  }
}

idea {
  project {
    languageLevel = 17
  }
}

subprojects {
  apply plugin: 'java-library'
  apply plugin: 'pegasus'
  apply plugin: 'com.github.spotbugs'

  // Aggregated test report directory (replaces removed testReportDirName convention property)
  test {
    reports.html.outputLocation = file("${project.rootDir}/out/${project.name}/")
  }

  // Avoid failure in internal LinkedIn build validation
  if (!ext.has('spec')) {
    ext.spec = [:]
  }

  sourceCompatibility = JavaVersion.VERSION_17
  targetCompatibility = JavaVersion.VERSION_17

  checkstyle {
    configFile = file("${project.rootDir}/checkstyle/checkstyle.xml")
    configDirectory = file("${project.rootDir}/checkstyle")
    sourceSets = [ getProject().sourceSets.main, getProject().sourceSets.test ]
    toolVersion = "$checkstyleVersion"
    ignoreFailures = false
  }

  // Checkstyle 10's transitive dependencies pull both guava and the legacy
  // com.google.collections:google-collections jar, which declare the same capability and make
  // Gradle's variant-aware resolution fail. Resolve in favour of guava.
  configurations.checkstyle {
    resolutionStrategy.capabilitiesResolution.withCapability('com.google.collections:google-collections') {
      selectHighestVersion()
    }
  }

  spotbugs {
    toolVersion = "$spotbugsVersion"
    effort = com.github.spotbugs.snom.Effort.DEFAULT
    reportLevel = com.github.spotbugs.snom.Confidence.MEDIUM
    excludeFilter = file("$rootProject.projectDir/findbugs/excludeFilter.xml")
    ignoreFailures = false
  }

  // Legacy FindBugs only analyzed the main source set. The SpotBugs plugin creates a task per
  // source set (including pegasus-generated ones), so disable everything except spotbugsMain.
  tasks.withType(com.github.spotbugs.snom.SpotBugsTask).configureEach {
    reports {
      xml.required = false
      html.required = true
    }
  }
  afterEvaluate {
    tasks.withType(com.github.spotbugs.snom.SpotBugsTask).configureEach { spotbugsTask ->
      if (spotbugsTask.name != 'spotbugsMain') {
        spotbugsTask.enabled = false
      }
    }
  }

  spec['product'] = ['pegasus':
                         ['data'        : 'com.linkedin.pegasus:data:' + pegasusVersion,
                          'restliCommon': 'com.linkedin.pegasus:restli-common:' + pegasusVersion,
                          'restliClient': 'com.linkedin.pegasus:restli-client:' + pegasusVersion,]
  ]

  // comment this out so the java files don't get auto-generated every time
  afterEvaluate {
    if (project.plugins.hasPlugin('pegasus')) {
      // add the standard pegasus dependencies wherever the plugin is used
      dependencies {
        dataTemplateCompile spec.product.pegasus.data
        restClientCompile spec.product.pegasus.restliClient

        // needed for Gradle 1.9+
        restClientCompile spec.product.pegasus.restliCommon
      }
    }

    // Expose datastream-common's generated data templates (Datastream, DatastreamSource, etc.)
    // to every other module. The data templates live in a separate 'data-template' jar published
    // through the pegasus 'dataTemplate' configuration. Under variant-aware dependency resolution
    // (Gradle 7+), a plain `project(':datastream-common')` dependency no longer pulls that jar
    // transitively, so it must be wired explicitly (mirrors how datastream-client consumes
    // 'restClient'). On Gradle 4 the legacy `compile` project dependency pulled it implicitly.
    if (project.name != 'datastream-common') {
      dependencies {
        api project(path: ':datastream-common', configuration: 'dataTemplate')
      }
    }
  }

  def results = [:].withDefault { [] }
  test {
    useTestNG()
    maxParallelForks = 1
    maxHeapSize = "2048m"
    // JDK 17 enforces strong encapsulation (JEP 396/403). Reflection-heavy dependencies
    // (Kafka, ZooKeeper, Avro, Mockito/ByteBuddy) require these modules to be opened.
    jvmArgs += [
      '--add-opens=java.base/java.lang=ALL-UNNAMED',
      '--add-opens=java.base/java.io=ALL-UNNAMED',
      '--add-opens=java.base/java.nio=ALL-UNNAMED',
      '--add-opens=java.base/java.nio.file=ALL-UNNAMED',
      '--add-opens=java.base/java.util=ALL-UNNAMED',
      '--add-opens=java.base/java.util.concurrent=ALL-UNNAMED',
      '--add-opens=java.base/java.util.regex=ALL-UNNAMED',
      '--add-opens=java.base/java.util.stream=ALL-UNNAMED',
      '--add-opens=java.base/java.text=ALL-UNNAMED',
      '--add-opens=java.base/java.time=ALL-UNNAMED',
      '--add-opens=java.base/sun.nio.ch=ALL-UNNAMED',
      '--add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED'
    ]
    testLogging {
      exceptionFormat = 'full'
      events "started", "passed", "skipped", "failed"
    }
    onOutput { descriptor, event ->
      results[descriptor.toString()] << event.message
    }

    afterTest { descriptor, result ->
      if(result.getResultType() == TestResult.ResultType.FAILURE) {
        logger.lifecycle("${descriptor.toString()} failed with output:\n${results[descriptor.toString()].join('')}")
      }
      results[descriptor.toString()] = []
    }
  }

  dependencies {
    api "log4j:log4j:$log4jVersion"
    api "org.slf4j:slf4j-api:$slf4jVersion"
    api "org.slf4j:slf4j-log4j12:$slf4jVersion"
    api "org.apache.commons:commons-lang3:$commonslang3Version"
    api "io.dropwizard.metrics:metrics-core:$metricsCoreVersion"
    api "io.dropwizard.metrics:metrics-jmx:$metricsCoreVersion"
    // SpotBugs annotations (edu.umd.cs.findbugs.annotations.*). Some third-party classes on the
    // compile classpath (e.g. ZooKeeper) carry @SuppressFBWarnings; without the annotation type
    // javac emits a "cannot find annotation method" warning, which -Werror turns into an error.
    // Previously the full com.google.code.findbugs:findbugs jar supplied these annotations.
    compileOnly "com.github.spotbugs:spotbugs-annotations:$spotbugsVersion"
    testCompileOnly "com.github.spotbugs:spotbugs-annotations:$spotbugsVersion"
    testImplementation "org.testng:testng:$testngVersion"
  }

  configurations.all {
    // Helix client pulls a transitive dependency of zookeeper from
    // org.apache.zookeeper group. This conflicts with the zookeeper
    // dependency from com.linkedin.zookeeper, which is required for
    // zookeeper pagination support.
    //
    // Excluding this just from "datastream-testcommon" is not sufficient
    exclude group: "org.apache.zookeeper", module: "zookeeper"
  }

  jar {
    manifest {
      attributes 'Implementation-Title': 'Datastream'
    }
  }

  tasks.withType(JavaCompile) {
    // Skipping 'deprecation' since pegasus generates problematic files and 'fallthrough' since it can't be suppressed
    // Xlint:all - [deprecation, fallthrough]
    options.compilerArgs = ["-Xlint:cast,classfile,dep-ann,divzero,empty,finally,options,overrides,path,processing,rawtypes,serial,static,try,unchecked,varargs", "-Xlint:-options", "-Werror"]
  }
}

project(':datastream-common') {
  dependencies {
    api "org.apache.avro:avro:$avroVersion"
    api "com.linkedin.pegasus:restli-server:$pegasusVersion"
    api "com.intellij:annotations:$intellijAnnotationsVersion"
    api "com.google.guava:guava:$guavaVersion"
    api "com.google.code.findbugs:jsr305:$jsr305Version"
    api "com.fasterxml.jackson.core:jackson-annotations:$jacksonVersion"
    api "com.fasterxml.jackson.core:jackson-core:$jacksonVersion"
    api "com.fasterxml.jackson.core:jackson-databind:$jacksonVersion"
    testImplementation "org.mockito:mockito-core:$mockitoVersion"
  }
}

project(':datastream-server-api') {
  dependencies {
    api project(':datastream-common')
    api project(':datastream-utils')
  }
}

project(':datastream-utils') {
  dependencies {
    api project(':datastream-common')
    api "com.linkedin.kafka:kafka-clients:$kafkaVersion"
    api "org.apache.helix:zookeeper-api:$helixZkclientVersion"
    api "com.linkedin.zookeeper:zookeeper:$zookeeperVersion"
    api "com.google.guava:guava:$guavaVersion"
    testImplementation project(":datastream-kafka")
    testImplementation project(":datastream-testcommon")
  }
}

project(':datastream-file-connector') {
  dependencies {
    api project(':datastream-server-api')
    api project(':datastream-common')
    api project(':datastream-utils')
    testImplementation project(':datastream-server')
    testImplementation project(":datastream-testcommon")
    testImplementation "org.mockito:mockito-core:$mockitoVersion"
  }
}

project(':datastream-directory') {
  dependencies {
    api project(':datastream-server-api')
    api project(':datastream-common')
    api "org.slf4j:slf4j-api:$slf4jVersion"
    api "org.apache.commons:commons-lang3:$commonslang3Version"
    api "commons-io:commons-io:$commonsIOVersion"
    api "com.google.guava:guava:$guavaVersion"
  }
}

project(":datastream-kafka") {
  dependencies {
    api "com.linkedin.kafka:kafka_$scalaSuffix:$kafkaVersion"
    api "commons-httpclient:commons-httpclient:$commonsHttpClientVersion"

    api project(':datastream-server')
    api project(':datastream-server-api')
    api project(':datastream-utils')

    testImplementation project(":datastream-testcommon")
    testImplementation "org.mockito:mockito-core:$mockitoVersion"

    tasks.create(name: "copyDependentLibs", type: Copy) {
      from (configurations.runtimeClasspath) {
      }
      into "$buildDir/dependent-libs"
    }

    jar {
      dependsOn 'copyDependentLibs'
    }
  }
}

project(':datastream-kafka-factory-impl') {
  dependencies {
    api project(':datastream-kafka-connector')

    testImplementation project(":datastream-kafka")
  }
}

project(':datastream-kafka-connector') {
  dependencies {
    api project(':datastream-server-api')
    api project(':datastream-common')
    api project(":datastream-kafka")
    api "org.apache.httpcomponents:httpclient:$apacheHttpClientVersion"
    api "commons-validator:commons-validator:$commonsValidatorVersion"
    api "org.apache.commons:commons-lang3:$commonslang3Version"
    api "javax.xml.bind:jaxb-api:2.3.1"

    testImplementation project(":datastream-kafka")
    testImplementation project(":datastream-testcommon")
    testImplementation project(':datastream-kafka-factory-impl')
    testImplementation "org.mockito:mockito-core:$mockitoVersion"
  }
}

project(":datastream-testcommon") {
  dependencies {
    api project(':datastream-server-api')
    api project(":datastream-kafka")
    api project(':datastream-common')
    api project(':datastream-utils')
    api project(':datastream-server')
    api project(':datastream-server-restli')
    api project(':datastream-client')
    api "com.intellij:annotations:$intellijAnnotationsVersion"
    api "commons-cli:commons-cli:$commonsCliVersion"
    api "org.apache.avro:avro:$avroVersion"
    api "com.google.code.findbugs:jsr305:$jsr305Version"
    api "com.linkedin.zookeeper:zookeeper:$zookeeperVersion"
    api "com.linkedin.pegasus:restli-server:$pegasusVersion"
    api "org.testng:testng:$testngVersion"
    api "com.google.guava:guava:$guavaVersion"
  }
}

project(':datastream-tools') {
  dependencies {
    api project(':datastream-common')
    api project(':datastream-client')
    api project(':datastream-server')
    api project(":datastream-testcommon")
    api "commons-cli:commons-cli:$commonsCliVersion"
  }

  tasks.create(name: "releaseTarGz", dependsOn: jar, type: Tar) {
    description = "Create Brooklin release tarball"
    archiveBaseName = "${rootProject.name}"
    into { "${rootProject.name}-$rootProject.version" }
    compression = Compression.GZIP
    from(rootProject.file("NOTICE"))
    from(rootProject.file("LICENSE"))
    from(rootProject.file("scripts")) { exclude "git" into "bin/" }
    from(rootProject.file("config")) { into "config/" }
    from(configurations.runtimeClasspath) { into("libs/") }
    from(jar) { into("libs/") }
    from(project(':datastream-tools').jar) { into("libs/") }
    from(project(':datastream-tools').configurations.runtimeClasspath) { into("libs/") }
    from(project(':datastream-server').jar) { into("libs/") }
    from(project(':datastream-server').configurations.runtimeClasspath) { into("libs/") }
    from(project(':datastream-file-connector').jar) { into("libs/") }
    from(project(':datastream-file-connector').configurations.runtimeClasspath) { into("libs/") }
    from(project(':datastream-directory').jar) { into("libs/") }
    from(project(':datastream-directory').configurations.runtimeClasspath) { into("libs/") }
    from(project(":datastream-testcommon").jar) { into("libs/") }
    from(project(":datastream-testcommon").configurations.runtimeClasspath) { into("libs/") }
    from(project(':datastream-common').jar) { into("libs/") }
    from(project(':datastream-common').configurations.runtimeClasspath) { into("libs/") }
    from(project(":datastream-kafka").jar) { into("libs/") }
    from(project(":datastream-kafka").configurations.runtimeClasspath) { into("libs/") }
    from(project(':datastream-kafka-connector').jar) { into("libs/") }
    from(project(':datastream-kafka-connector').configurations.runtimeClasspath) { into("libs/") }
    duplicatesStrategy 'exclude'
  }
}

project(':datastream-client') {

  dependencies {
    api project(path: ':datastream-common', configuration: 'restClient')

    api "com.linkedin.pegasus:restli-client:$pegasusVersion"
    api "com.linkedin.pegasus:r2-netty:$pegasusVersion"
    api "org.apache.avro:avro:$avroVersion"

    api project(':datastream-common')
    api project(':datastream-utils')

    testImplementation project(":datastream-testcommon")
    testImplementation project(":datastream-kafka")
    testImplementation project(':datastream-server')
    testImplementation "org.mockito:mockito-core:$mockitoVersion"
  }
}

project(':datastream-server') {

  dependencies {
    api "com.fasterxml.jackson.core:jackson-annotations:$jacksonVersion"
    api "com.fasterxml.jackson.core:jackson-core:$jacksonVersion"
    api "com.fasterxml.jackson.core:jackson-databind:$jacksonVersion"

    api project(':datastream-server-api')
    api project(':datastream-common')
    api project(':datastream-utils')
    api project(':datastream-client')

    testImplementation project(":datastream-kafka")
    testImplementation "com.linkedin.kafka:kafka_$scalaSuffix:$kafkaVersion"
    testImplementation project(':datastream-client')
    testImplementation project(":datastream-testcommon")
    testImplementation "org.mockito:mockito-core:$mockitoVersion"
  }

  tasks.create(name: "copyDependentLibs", type: Copy) {
    from (configurations.runtimeClasspath) {
    }
    into "$buildDir/dependent-libs"
  }

  jar {
    dependsOn 'copyDependentLibs'
  }
}

project(':datastream-server-restli') {
  ext.apiProject = project(':datastream-common')
  pegasus.main.idlOptions.addIdlItem(['com.linkedin.datastream.server.dms', 'com.linkedin.datastream.server.diagnostics'])

  dependencies {
    api "com.linkedin.pegasus:restli-server:$pegasusVersion"
    api "com.linkedin.pegasus:restli-netty-standalone:$pegasusVersion"
    api "com.linkedin.pegasus:r2-jetty:$pegasusVersion"
    api "com.linkedin.parseq:parseq:$parseqVersion"
    api "com.fasterxml.jackson.core:jackson-annotations:$jacksonVersion"
    api "com.fasterxml.jackson.core:jackson-core:$jacksonVersion"
    api "com.fasterxml.jackson.core:jackson-databind:$jacksonVersion"
    api "org.apache.commons:commons-lang3:$commonslang3Version"

    api project(':datastream-server')
    api project(':datastream-common')

    testImplementation project(":datastream-kafka")
    testImplementation "com.linkedin.kafka:kafka_$scalaSuffix:$kafkaVersion"
    testImplementation project(':datastream-client')
    testImplementation project(':datastream-file-connector')
    testImplementation project(":datastream-testcommon")
    testImplementation "org.mockito:mockito-core:$mockitoVersion"
  }

  tasks.create(name: "copyDependentLibs", type: Copy) {
    from (configurations.runtimeClasspath) {
    }
    into "$buildDir/dependent-libs"
  }

  jar {
    dependsOn 'copyDependentLibs'
  }

  // For test or experiment purpose
  task startStandaloneRestServer(type: JavaExec) {
    mainClass = 'com.linkedin.restli.server.NettyStandaloneLauncher'
    args = ['-port', '8080', '-packages', 'com.linkedin.datastream.server.dms']
    classpath = sourceSets.main.runtimeClasspath
    standardInput = System.in
  }
}
