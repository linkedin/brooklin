status = warn
name = BrooklinServerConfig

# Console appender
appender.stdout.type = Console
appender.stdout.name = stdout
appender.stdout.target = SYSTEM_OUT
appender.stdout.layout.type = PatternLayout
appender.stdout.layout.pattern = [%d] %p %m (%c)%n

# Hourly-rolling file appender (replacement for log4j 1.x DailyRollingFileAppender)
appender.datastreamServiceAppender.type = RollingFile
appender.datastreamServiceAppender.name = datastreamServiceAppender
appender.datastreamServiceAppender.fileName = ${sys:datastream.logs.dir}/server.log
appender.datastreamServiceAppender.filePattern = ${sys:datastream.logs.dir}/server.log.%d{yyyy-MM-dd-HH}
appender.datastreamServiceAppender.layout.type = PatternLayout
appender.datastreamServiceAppender.layout.pattern = [%d] %p %m (%c)%n
appender.datastreamServiceAppender.policies.type = Policies
appender.datastreamServiceAppender.policies.time.type = TimeBasedTriggeringPolicy
appender.datastreamServiceAppender.policies.time.interval = 1
appender.datastreamServiceAppender.policies.time.modulate = true

rootLogger.level = info
rootLogger.appenderRef.datastreamServiceAppender.ref = datastreamServiceAppender
rootLogger.appenderRef.stdout.ref = stdout
